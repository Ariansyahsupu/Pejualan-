        export default function App() {
          const [activeTab, setActiveTab] = useState('dashboard');

          // --- STATE: DATA PRODUK & HPP (Otomatis dari Spreadsheet) ---
          const [products, setProducts] = useState([]);
          const [isLoadingProducts, setIsLoadingProducts] = useState(true);

          useEffect(() => {
            // Fetch dari URL CSV Spreadsheet Publik Anda
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMYPiHfpDtnOIMdbzSvbhUn1Fd1XFDX8s-smQLvGqgVoasE8t-r4DQPmzysVIj6PbRvkQY_tPbIRI_/pub?gid=0&single=true&output=csv";
            
            fetch(csvUrl)
              .then(res => res.text())
              .then(csvText => {
                const parseCSVRow = (str) => {
                  let result = [], current = '', inQuotes = false;
                  for (let i = 0; i < str.length; i++) {
                    let char = str[i];
                    if (inQuotes) {
                      if (char === '"') {
                         if (str[i+1] === '"') { current += '"'; i++; } else { inQuotes = false; }
                      } else { current += char; }
                    } else {
                      if (char === '"') { inQuotes = true; }
                      else if (char === ',') { result.push(current); current = ''; }
                      else { current += char; }
                    }
                  }
                  result.push(current);
                  return result.map(s => s.trim());
                };

                const parseIDR = (str) => {
                   if (!str) return 0;
                   let clean = str.replace(/Rp/gi, '').replace(/\./g, '').replace(/\s/g, '').replace(/,/g, '.');
                   return parseFloat(clean) || 0;
                };

                const rows = csvText.split('\n');
                const fetchedProducts = [];
                
                // Melewati baris Header (Mulai index 1)
                for (let i = 1; i < rows.length; i++) {
                   if (!rows[i].trim()) continue;
                   const row = parseCSVRow(rows[i]);
                   if (!row[0]) continue; // Pastikan nama produk ada
                   
                   const name = row[0];
                   const price = parseIDR(row[1]);
                   const mCost = parseIDR(row[2]);
                   const lCost = parseIDR(row[3]);
                   const pTR = parseIDR(row[4]);
                   const locis = parseIDR(row[5]);
                   const karet = parseIDR(row[6]);
                   const serbuk = parseIDR(row[7]);
                   const pLokas = parseIDR(row[8]);
                   const sertifikat = row[9];
                   const certCost = parseIDR(row[10]);
                   const biayaKirimTipe = row[11];
                   const bKirim = parseIDR(row[12]);

                   // Asumsi Label TR jika berlaku sudah ditambahkan di input awal, perhitungan kemasan:
                   const kemasanCost = pTR + locis + karet + serbuk + pLokas;
                   const hpp = mCost + lCost + kemasanCost + certCost + bKirim;

                   fetchedProducts.push({
                     id: i, // Menggunakan index sebagai ID lokal
                     name: name,
                     materialCost: mCost,
                     laborCost: lCost,
                     kemasanCost: kemasanCost,
                     sertifikatCost: certCost,
                     biayaKirimCost: bKirim,
                     hpp: hpp,
                     price: price,
                     sertifikat: sertifikat
                   });
                }
                setProducts(fetchedProducts);
                setIsLoadingProducts(false);
              })
              .catch(err => {
                 console.error("Gagal mengambil data Spreadsheet:", err);
                 setIsLoadingProducts(false);
              });

            // Fetch Jurnal Transaksi dari Spreadsheet
            const salesCsvUrl = "https://docs.google.com/spreadsheets/d/19muvmAtdRxYJckDuXADBz3PbDaSQKtbLy3fwEwUwGcU/export?format=csv&gid=797738335";
            fetch(salesCsvUrl)
              .then(res => res.text())
              .then(csvText => {
                const parseCSVRow = (str) => {
                  let result = [], current = '', inQuotes = false;
                  for (let i = 0; i < str.length; i++) {
                    let char = str[i];
                    if (inQuotes) {
                      if (char === '"') {
                         if (str[i+1] === '"') { current += '"'; i++; } else { inQuotes = false; }
                      } else { current += char; }
                    } else {
                      if (char === '"') { inQuotes = true; }
                      else if (char === ',') { result.push(current); current = ''; }
                      else { current += char; }
                    }
                  }
                  result.push(current);
                  return result.map(s => s.trim());
                };

                const parseIDR = (str) => {
                   if (!str) return 0;
                   let clean = str.toString().replace(/Rp/gi, '').replace(/\./g, '').replace(/\s/g, '').replace(/,/g, '.');
                   return parseFloat(clean) || 0;
                };

                const rows = csvText.split('\n');
                const fetchedSales = [];
                for (let i = 1; i < rows.length; i++) {
                  if (!rows[i].trim()) continue;
                  const row = parseCSVRow(rows[i]);
                  if (!row[0]) continue; // Pastikan tanggal ada
                  
                  fetchedSales.push({
                    id: i,
                    date: row[0],
                    province: row[1] || '',
                    area: row[2] || '',
                    productName: row[3] || '',
                    qty: parseInt(row[4]) || 0,
                    totalCost: parseIDR(row[5]),
                    revenue: parseIDR(row[6]),
                    profit: parseIDR(row[7])
                  });
                }
                // Reverse agar yang terbaru di atas
                setSales(fetchedSales.reverse());
              })
              .catch(err => console.error("Gagal mengambil data Penjualan:", err));

          }, []);

          // --- STATE: DATA PENJUALAN ---
          const [sales, setSales] = useState([]);

          // --- DERIVED DATA (ANALYTICS) ---
          const dashboardData = useMemo(() => {
            let totalRevenue = 0;
            let totalHPP = 0;
            const areaBreakdown = {};
            const productBreakdown = {};

            sales.forEach(sale => {
              totalRevenue += sale.revenue;
              totalHPP += sale.totalCost;

              const locationKey = `${sale.area}, ${sale.province}`;

              // Area Breakdown
              if (!areaBreakdown[locationKey]) {
                areaBreakdown[locationKey] = { revenue: 0, qty: 0, profit: 0 };
              }
              areaBreakdown[locationKey].revenue += sale.revenue;
              areaBreakdown[locationKey].qty += sale.qty;
              areaBreakdown[locationKey].profit += sale.profit;

              // Product Breakdown
              if (!productBreakdown[sale.productName]) {
                productBreakdown[sale.productName] = { revenue: 0, qty: 0, profit: 0 };
              }
              productBreakdown[sale.productName].revenue += sale.revenue;
              productBreakdown[sale.productName].qty += sale.qty;
              productBreakdown[sale.productName].profit += sale.profit;
            });

            const totalProfit = totalRevenue - totalHPP;
            const profitMargin = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;

            // Sort breakdowns
            const sortedAreas = Object.entries(areaBreakdown)
              .map(([name, data]) => ({ name, ...data }))
              .sort((a, b) => b.revenue - a.revenue);

            const sortedProducts = Object.entries(productBreakdown)
              .map(([name, data]) => ({ name, ...data }))
              .sort((a, b) => b.qty - a.qty);

            return { totalRevenue, totalHPP, totalProfit, profitMargin, sortedAreas, sortedProducts };
          }, [sales, products]);

          // --- STYLING FONT PROFESIONAL ---
          const fontStyle = {
            fontFamily: "'Inter', system-ui, -apple-system, sans-serif"

          // --- COMPONENT: SIDEBAR ---
          const Sidebar = () => (
            <div className="w-full md:w-64 shrink-0 bg-gradient-to-b from-slate-900 to-slate-950 text-slate-300 flex flex-col md:h-full border-b md:border-b-0 md:border-r border-slate-800 shadow-xl z-10" style={fontStyle}>
              <div className="p-4 md:p-6 border-b border-slate-800/50 flex justify-between items-center md:items-start md:flex-col">
                <h1 className="text-xl md:text-2xl font-semibold text-white flex items-center gap-2 md:gap-3">

                    <TrendingUp size={18} className="text-white w-5 h-5 md:w-auto md:h-auto" />

                      <select 
                        required
                        className="w-full px-3 py-2 bg-indigo-50/50 border border-indigo-200 text-slate-800 text-sm rounded-md focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-colors"
                        value={newSale.pilihanPackingCost} 
                        onChange={e => setNewSale({...newSale, pilihanPackingCost: e.target.value})}
                      >
                        <option value="" disabled>-- Pilih Kotak --</option>
                        <option value="400000">Kotak Local (Graded) Super (400.000)</option>
                        <option value="85000">Kotak Stereform (85.000)</option>
                        <option value="70000">Kotak Stereform Kecil (70.000)</option>
                        <option value="250000">Kotak Local (Graded) (250.000)</option>
                        <option value="15000">Kotak Biasa (15.000)</option>
                        <option value="0">Tanpa Packing (0)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1.5">Tanggal Transaksi</label>
                      <input 
                        type="date" required
                        className="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 text-sm rounded-md focus:ring-2 focus:ring-slate-500/20 focus:border-slate-500 outline-none transition-colors"
                        value={newSale.date}
                        onChange={e => setNewSale({...newSale, date: e.target.value})}
                      />
                    </div>

                    <div className="lg:col-span-3 flex justify-end mt-2 pt-4 border-t border-slate-100">
                      <button type="submit" className="bg-gradient-to-r from-slate-800 to-slate-700 hover:from-slate-700 hover:to-slate-600 shadow-sm border border-slate-600 text-white text-sm font-medium py-2 px-6 rounded-md flex items-center justify-center gap-2 transition-all duration-200">
                        <Save size={16} /> Rekam Transaksi
                      </button>
                    </div>
                  </form>
                </div>

                <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                   <div className="p-4 border-b border-slate-200 bg-white">
                     <h3 className="font-semibold text-slate-800 text-base">Jurnal Transaksi</h3>
                   </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-medium uppercase">
                        <tr>
                          <th className="px-4 py-3">Tanggal</th>
                          <th className="px-4 py-3">Informasi Lokasi</th>
                          <th className="px-4 py-3">Produk & Vol.</th>
                          <th className="px-4 py-3 text-right">Pengeluaran (HPP + Pack)</th>
                          <th className="px-4 py-3 text-right">Nilai Transaksi</th>
                          <th className="px-4 py-3 text-right">Laba Bersih</th>
                          <th className="px-4 py-3 text-center">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {sales.map((s) => {
                          return (
                            <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                              <td className="px-4 py-3 text-slate-600">{s.date}</td>
                              <td className="px-4 py-3 font-medium text-slate-800">
                                {s.area}, {s.province}
                              </td>
                              <td className="px-4 py-3">
                                <p className="text-slate-700 font-medium">{s.productName}</p>
                                <p className="text-xs text-slate-500 mt-0.5">Vol: {s.qty} Kampil</p>
                              </td>
                              <td className="px-4 py-3 text-right">
                                <p className="font-medium text-rose-600">{formatRupiah(s.totalCost)}</p>
                              </td>
                              <td className="px-4 py-3 text-right font-medium text-slate-800">{formatRupiah(s.revenue)}</td>
                              <td className="px-4 py-3 text-right font-bold text-emerald-600">{formatRupiah(s.profit)}</td>
                              <td className="px-4 py-3 text-center">
                                <button onClick={() => handleDeleteSale(s.id)} className="text-slate-400 hover:text-slate-700 transition-colors" title="Hapus Transaksi">
                                  <Trash2 size={16} />
                                </button>
                              </td>
                            </tr>
                          )
                        })}
                        {sales.length === 0 && (
                          <tr>
                            <td colSpan="7" className="px-4 py-8 text-center text-slate-500 text-sm">
                              Belum ada entri transaksi penjualan atau sedang memuat data.
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="flex flex-col md:flex-row h-screen bg-slate-50 overflow-hidden text-slate-800">
              <Sidebar />
              <div className="flex-1 overflow-y-auto">
                {activeTab === 'dashboard' && <DashboardView />}
                {activeTab === 'products' && <ProductsView />}
                {activeTab === 'sales' && <SalesView />}
              </div>
            </div>
          );
        }

        // --- RENDER APP ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
