        export default function App() {
          const [activeTab, setActiveTab] = useState('dashboard');

          // --- STATE: DATA PRODUK & HPP (Otomatis dari Spreadsheet) ---
          const [products, setProducts] = useState([]);
          const [isLoadingProducts, setIsLoadingProducts] = useState(true);

          useEffect(() => {
            // Fetch dari URL CSV Spreadsheet Publik Anda
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMYPiHfpDtnOIMdbzSvbhUn1Fd1XFDX8s-smQLvGqgVoasE8t-r4DQPmzysVIj6PbRvkQY_tPbIRI_/pub?gid=0&single=true&output=csv";
            
            fetch(csvUrl)
              .then(res => res.text())
              .then(csvText => {
                const parseCSVRow = (str) => {
                  let result = [], current = '', inQuotes = false;
                  for (let i = 0; i < str.length; i++) {
                    let char = str[i];
                    if (inQuotes) {
                      if (char === '"') {
                         if (str[i+1] === '"') { current += '"'; i++; } else { inQuotes = false; }
                      } else { current += char; }
                    } else {
                      if (char === '"') { inQuotes = true; }
                      else if (char === ',') { result.push(current); current = ''; }
                      else { current += char; }
                    }
                  }
                  result.push(current);
                  return result.map(s => s.trim());
                };

                const parseIDR = (str) => {
                   if (!str) return 0;
                   let clean = str.replace(/Rp/gi, '').replace(/\./g, '').replace(/\s/g, '').replace(/,/g, '.');
                   return parseFloat(clean) || 0;
                };

                const rows = csvText.split('\n');
                const fetchedProducts = [];
                
                // Melewati baris Header (Mulai index 1)
                for (let i = 1; i < rows.length; i++) {
                   if (!rows[i].trim()) continue;
                   const row = parseCSVRow(rows[i]);
                   if (!row[0]) continue; // Pastikan nama produk ada
                   
                   const name = row[0];
                   const price = parseIDR(row[1]);
                   const mCost = parseIDR(row[2]);
                   const lCost = parseIDR(row[3]);
                   const pTR = parseIDR(row[4]);
                   const locis = parseIDR(row[5]);
                   const karet = parseIDR(row[6]);
                   const serbuk = parseIDR(row[7]);
                   const pLokas = parseIDR(row[8]);
                   const sertifikat = row[9];
                   const certCost = parseIDR(row[10]);
                   const biayaKirimTipe = row[11];
                   const bKirim = parseIDR(row[12]);

                   // Asumsi Label TR jika berlaku sudah ditambahkan di input awal, perhitungan kemasan:
                   const kemasanCost = pTR + locis + karet + serbuk + pLokas;
                   const hpp = mCost + lCost + kemasanCost; // Legalitas & Logistik dipisah dari Base HPP

                   fetchedProducts.push({
                     id: i, // Menggunakan index sebagai ID lokal
                     name: name,
                     materialCost: mCost,
                     laborCost: lCost,
                     kemasanCost: kemasanCost,
                     sertifikatCost: certCost,
                     biayaKirimCost: bKirim,
                     hpp: hpp,
                     price: price,
                     sertifikat: sertifikat
                   });
                }
                setProducts(fetchedProducts);
                setIsLoadingProducts(false);
              })
              .catch(err => {
                 console.error("Gagal mengambil data Spreadsheet:", err);
                 setIsLoadingProducts(false);
              });

            // Fetch Jurnal Transaksi dari Spreadsheet
            const salesCsvUrl = "https://docs.google.com/spreadsheets/d/19muvmAtdRxYJckDuXADBz3PbDaSQKtbLy3fwEwUwGcU/export?format=csv&gid=797738335";
            fetch(salesCsvUrl)
              .then(res => res.text())
              .then(csvText => {
                const parseCSVRow = (str) => {
                  let result = [], current = '', inQuotes = false;
                  for (let i = 0; i < str.length; i++) {
                    let char = str[i];
                    if (inQuotes) {
                      if (char === '"') {
                         if (str[i+1] === '"') { current += '"'; i++; } else { inQuotes = false; }
                      } else { current += char; }
                    } else {
                      if (char === '"') { inQuotes = true; }
                      else if (char === ',') { result.push(current); current = ''; }
                      else { current += char; }
                    }
                  }
                  result.push(current);
                  return result.map(s => s.trim());
                };

                const parseIDR = (str) => {
                   if (!str) return 0;
                   let strStr = str.toString();
                   // Cek apakah ada tanda minus atau kurung yang menandakan nilai negatif/rugi
                   let isNegative = strStr.includes('-') || (strStr.includes('(') && strStr.includes(')'));
                   // Bersihkan semua karakter selain angka murni
                   let clean = strStr.replace(/[^0-9]/g, '');
                   let val = parseFloat(clean) || 0;
                   return isNegative ? -val : val;
                };

                const rows = csvText.split('\n');
                const fetchedSales = [];
                for (let i = 1; i < rows.length; i++) {
                  if (!rows[i].trim()) continue;
                  const row = parseCSVRow(rows[i]);
                  if (!row[0]) continue; // Pastikan tanggal ada
                  
                  // Secara kaku membaca format 11 Kolom terbaru agar Dashboard tidak bocor/meleset
                  let date = row[0] || '';
                  let buyerName = row[1] || '-';
                  let province = row[2] || '';
                  let area = row[3] || '';
                  let productName = row[4] || '';
                  let qty = parseInt(row[5]) || 0;
                  let bonusQty = parseInt(row[6]) || 0;
                  let hppCost = parseIDR(row[7]);
                  let packCost = parseIDR(row[8]);
                  let revenue = parseIDR(row[9]);
                  let profit = parseIDR(row[10]);
                  
                  // Menambahkan logika membaca kolom ke-12 (Kolom L) untuk Status Pembayaran
                  let paymentStatus = row.length > 11 ? (row[11] || 'Open') : 'Open';

                  // Kalkulasi Total Cost untuk dipakai di Dashboard (HPP + Packing)
                  let totalCost = hppCost + packCost;

                  fetchedSales.push({
                    id: i, // Index baris ini berkolerasi dengan baris di Spreadsheet (id = index array)
                    date: date,
                    buyerName: buyerName,
                    province: province,
                    area: area,
                    productName: productName,
                    qty: qty,
                    bonusQty: bonusQty,
                    hppTotal: hppCost,
                    packingTotal: packCost,
                    totalCost: totalCost,
                    revenue: revenue,
                    profit: profit,
                    paymentStatus: paymentStatus
                  });
                }
                // Reverse agar yang terbaru di atas
                setSales(fetchedSales.reverse());
              })
              .catch(err => console.error("Gagal mengambil data Penjualan:", err));

          }, []);

            const [selectedProvince, setSelectedProvince] = useState(null);

            // Mengambil daftar bulan unik yang ada di data (Format: YYYY-MM)
            const availableMonths = useMemo(() => {
              const m = new Set(sales.map(s => s.date.substring(0, 7)).filter(d => d.length === 7));
              return Array.from(m).sort().reverse();
            }, [sales]);

            const formatMonth = (ym) => {
              const [y, m] = ym.split('-');
              const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
              return `${months[parseInt(m, 10)-1]} ${y}`;
            };

            const toggleMonth = (m) => {
              if (selectedMonths.includes(m)) {
                setSelectedMonths(selectedMonths.filter(x => x !== m));
              } else {
                setSelectedMonths([...selectedMonths, m]);
              }
            };

            // Kalkulasi Dashboard secara spesifik menggunakan filter Bulan
            const dashboardData = useMemo(() => {
              let filteredSales = sales;
              if (selectedMonths.length > 0) {
                filteredSales = sales.filter(s => selectedMonths.includes(s.date.substring(0, 7)));
              }

              let totalRevenue = 0;
              let totalHPP = 0;
              const provBreakdown = {};
              const productBreakdown = {};

              filteredSales.forEach(sale => {
                totalRevenue += sale.revenue;
                totalHPP += sale.totalCost;

                // Breakdown Provinsi -> Kota -> Produk
                if (!provBreakdown[sale.province]) {
                  provBreakdown[sale.province] = { revenue: 0, qty: 0, cities: {}, products: {} };
                }
                provBreakdown[sale.province].revenue += sale.revenue;
                provBreakdown[sale.province].qty += sale.qty;

                if (!provBreakdown[sale.province].cities[sale.area]) {
                  provBreakdown[sale.province].cities[sale.area] = { revenue: 0, qty: 0 };
                }
                provBreakdown[sale.province].cities[sale.area].revenue += sale.revenue;
                provBreakdown[sale.province].cities[sale.area].qty += sale.qty;

                if (!provBreakdown[sale.province].products[sale.productName]) {
                  provBreakdown[sale.province].products[sale.productName] = 0;
                }
                provBreakdown[sale.province].products[sale.productName] += sale.qty;

                // Breakdown Produk Global (untuk tabel sebelah kanan)
                if (!productBreakdown[sale.productName]) {
                  productBreakdown[sale.productName] = { revenue: 0, qty: 0, profit: 0 };
                }
                productBreakdown[sale.productName].revenue += sale.revenue;
                productBreakdown[sale.productName].qty += sale.qty;
                productBreakdown[sale.productName].profit += sale.profit;
              });

              const totalProfit = totalRevenue - totalHPP;
              const profitMargin = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;

              // Hitung persentase per provinsi

                .map(([name, data]) => {
                   const percentage = totalRevenue > 0 ? (data.revenue / totalRevenue) * 100 : 0;
                   return { name, ...data, percentage };
                })
                .sort((a, b) => b.revenue - a.revenue);

              const sortedProducts = Object.entries(productBreakdown)
                .map(([name, data]) => ({ name, ...data }))
                .sort((a, b) => b.qty - a.qty);

              // Data Trend Bulanan untuk Diagram Garis

              filteredSales.forEach(sale => {
                const month = sale.date.substring(0, 7);

                  monthlyTrendMap[month] = { name: formatMonth(month), Omset: 0, Laba: 0, sortKey: month };
                }
                monthlyTrendMap[month].Omset += sale.revenue;
                monthlyTrendMap[month].Laba += sale.profit;
              });
              const trendData = Object.values(monthlyTrendMap).sort((a, b) => a.sortKey.localeCompare(b.sortKey));

              return { totalRevenue, totalHPP, totalProfit, profitMargin, sortedProvinces, sortedProducts, trendData };

                        <Legend iconType="circle" wrapperStyle={{ fontSize: '12px', paddingTop: '10px' }} verticalAlign="top" />

                        <Line type="monotone" dataKey="Laba" name="Laba Bersih" stroke="#6366f1" strokeWidth={3} dot={{ r: 4, strokeWidth: 2, fill: '#fff' }} activeDot={{ r: 6 }} />
                      </LineChart>

                                <PieChart>

                                    dataKey="revenue" 
                                    nameKey="name"

                                    cy="50%" 
                                    innerRadius="55%"
                                    outerRadius="80%" 
                                    paddingAngle={2}
                                    onClick={(data) => setSelectedProvince(data.name)} 
                                    cursor="pointer"
                                  >
                                    {sortedProvinces.map((entry, index) => (

                      const hppPerKampil = (parseFloat(newProduct.materialCost)||0) + (parseFloat(newProduct.laborSortir)||0) + (newProduct.name === 'Local (Graded)' ? (parseFloat(newProduct.labelCost)||0) : 0) + ((newProduct.name === 'Uncertified Dura' || newProduct.name === 'Tenera (DxP)') ? 0 : (parseFloat(newProduct.kemasanPlastikTR)||0)) + (newProduct.name === 'Uncertified Dura' ? 0 : (parseFloat(newProduct.kemasanLocis)||0)) + (parseFloat(newProduct.kemasanKaret)||0) + (parseFloat(newProduct.kemasanSerbuk)||0) + (newProduct.name === 'Local (Graded)' ? 0 : (parseFloat(newProduct.kemasanPlastikLokas)||0));
                      
                      const currentPrice = parseFloat(newProduct.price)||0;
                      
                      // Values untuk Simulasi
                      const simQty = parseInt(newProduct.simQty) || 0;
                      const simBonusQty = parseInt(newProduct.simBonusQty) || 0;
                      const laborPack = parseFloat(newProduct.laborPacking)||0;
                      const boxPack = parseFloat(newProduct.pilihanPackingCost)||0;
                      const certPack = parseFloat(newProduct.sertifikatCost)||0;
                      const ongkirPack = newProduct.biayaKirimTipe === 'Dibebankan ke pembeli' ? 0 : (parseFloat(newProduct.biayaKirimCost)||0);
                      
                      // HPP ditagihkan untuk Qty + Bonus
                      const totalHppSimulasi = (hppPerKampil * (simQty + simBonusQty)) + laborPack + boxPack + certPack + ongkirPack;
                      const totalOmsetSimulasi = currentPrice * simQty; // Omset hanya dari Qty reguler
                      const currentLaba = totalOmsetSimulasi - totalHppSimulasi;
                      const currentMargin = totalOmsetSimulasi > 0 ? (currentLaba / totalOmsetSimulasi) * 100 : 0;

                      return (
                        <div className="mt-6 p-5 bg-gradient-to-br from-slate-100 to-white shadow-sm border border-slate-200 rounded-md flex flex-col gap-5">

                            <div>
                              <p className="text-[11px] font-medium text-slate-500 uppercase tracking-wider mb-1">HPP Dasar (Per Kampil)</p>
                              <p className="text-lg font-semibold text-slate-800">
                                {formatRupiah(hppPerKampil)}
                              </p>
                            </div>
                            <div>
                               <p className="text-[11px] font-medium text-slate-500 uppercase tracking-wider mb-1">Target Harga Jual</p>
                              <p className="text-lg font-semibold text-slate-800">
                                {formatRupiah(currentPrice)}
                              </p>
                            </div>
                          </div>

                          {/* Simulasi Pesanan View */}
                          <div className="flex flex-wrap gap-8 items-end">

                              <p className="text-[11px] font-medium text-indigo-600 uppercase tracking-wider mb-1">Simulasi Total Pengeluaran</p>
                              <p className="text-xl font-bold text-slate-800" title={`(HPP x ${simQty + simBonusQty}) + Tenaga Packing + Harga Box + Sertifikat + Ongkir`}>
                                {formatRupiah(totalHppSimulasi)}
                              </p>
                            </div>
                            <div>
                               <p className="text-[11px] font-medium text-indigo-600 uppercase tracking-wider mb-1">Total Laba (Pesanan Ini)</p>
                              <p className={`text-xl font-bold ${currentLaba >= 0 ? 'text-slate-800' : 'text-slate-400'}`}>
                                {formatRupiah(currentLaba)}
                              </p>
                            </div>
                            <div>
                               <p className="text-[11px] font-medium text-indigo-600 uppercase tracking-wider mb-1">Margin Keuntungan</p>
                              <p className={`text-xl font-bold ${currentMargin >= 20 ? 'text-emerald-600' : currentMargin > 0 ? 'text-amber-600' : 'text-rose-600'}`}>
                                {currentMargin.toFixed(1)}%
                              </p>
                            </div>
                          </div>

                          <div className="bg-blue-50/50 border border-blue-100 text-blue-800 text-xs px-3 py-2.5 rounded-md mt-1 leading-relaxed">
                            <span className="font-semibold">💡 Teori Standar Margin:</span> Rekomendasi margin ideal untuk industri retail & distribusi yang sehat umumnya berada di kisaran <strong>20% - 30%</strong>. Hal ini penting agar bisnis memiliki buffer/cadangan yang cukup untuk menutup biaya tak terduga dan memastikan profitabilitas tetap aman.
                          </div>
                        </div>
                      );
                    })()

                <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">

              setSales(sales.map(s => s.id === saleId ? { ...s, paymentStatus: 'Close' } : s));

              // Kirim instruksi update ke Apps Script
              fetch(SCRIPT_URL, {
                method: "POST",

                  "Content-Type": "text/plain;charset=utf-8",

                body: JSON.stringify({
                  action: "updateStatus",
                  sheetName: "Jurnal Transaksi",
                  rowIndex: saleId + 1, // Baris asli di spreadsheet = index CSV + 1
                  colIndex: 12, // Kolom ke-12 (Kolom L) adalah tempat kita menyimpan status
                  value: "Close"

              const revenue = p.price * newSale.qty;
              // Biaya dipisah:

              const packingTotal = (parseFloat(newSale.laborPacking) || 0) + (parseFloat(newSale.pilihanPackingCost) || 0);

                              </td>
                              <td className="px-2 py-2 text-right text-[10px] sm:text-[11px] font-medium text-slate-800 whitespace-nowrap">{formatRupiah(s.revenue)}</td>
                              <td className="px-2 py-2 text-right text-[10px] sm:text-[11px] font-bold text-emerald-600 whitespace-nowrap">{formatRupiah(s.profit)}</td>
                              
                              {/* Kolom Status Baru */}
                              <td className="px-2 py-2 text-center">
                                {(s.paymentStatus === 'Close' || s.paymentStatus === 'close') ? (
                                  <span className="bg-emerald-100/80 text-emerald-700 border border-emerald-200 px-2 py-1 rounded text-[9px] sm:text-[10px] font-bold whitespace-nowrap">
                                    CLOSED
                                  </span>
                                ) : (
                                  <button 
                                    onClick={() => handleUpdateStatus(s.id)} 
                                    className="bg-slate-700 hover:bg-slate-800 text-white px-2 py-1.5 rounded text-[9px] sm:text-[10px] font-medium transition-colors shadow-sm whitespace-nowrap"
                                  >
                                    Set Close
                                  </button>
                                )}
                              </td>

                              <td className="px-2 py-2 text-center text-[10px] sm:text-[11px]">
                                <button onClick={() => handleDeleteSale(s.id)} className="text-slate-400 hover:text-slate-700 transition-colors" title="Hapus Transaksi">
                                  <Trash2 size={14} />
                                </button>
                              </td>
                            </tr>
                          )
                        })}
                        {sales.length === 0 && (
                          <tr>
                            <td colSpan="13" className="px-4 py-8 text-center text-slate-500 text-sm">
                              Belum ada entri transaksi penjualan atau sedang memuat data.
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="flex flex-col md:flex-row h-screen bg-slate-50 overflow-hidden text-slate-800">
              <Sidebar />
              <div className="flex-1 overflow-y-auto">
                {activeTab === 'dashboard' && <DashboardView />}
                {activeTab === 'products' && <ProductsView />}
                {activeTab === 'sales' && <SalesView />}
              </div>
            </div>
          );
        }

        // --- RENDER APP ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
